<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出欠確認</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f6fa;
  padding:20px;
}

h1{ text-align:center; }

.container{
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:900px;
  margin:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

select,input,button{
  padding:8px;
  margin:5px;
}

.good{background:#c8f7c5;}
.ng{background:#ffd6d6;}
.partial{background:#fff4c2;}

#bestDay{
  margin-top:15px;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>出欠確認フォーム</h1>

名前：
<input id="name" placeholder="名前">

<div id="dates"></div>

<button onclick="submitAnswer()">送信</button>
<button onclick="deleteAnswer()">自分の回答を削除</button>

<p id="message"></p>

<h2>出席結果</h2>
<div id="result"></div>
<div id="bestDay"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
