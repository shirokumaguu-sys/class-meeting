<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>来場者集計</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
}

h1{
  font-size:28px;
}

input,button{
  font-size:18px;
  padding:6px;
  margin:5px;
}

#calendar{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day{
  border:1px solid #ccc;
  padding:10px;
}

.result{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>来場者入力</h1>

<label>日付：</label>
<input type="date" id="date">

<br>

<label>午前：</label>
<input type="number" id="morning" min="0">

<label>午後：</label>
<input type="number" id="afternoon" min="0">

<br>

<button onclick="submitData()">送信</button>

<div id="calendar"></div>

<div class="result" id="result"></div>

<script src="script.js"></script>

</body>
</html>
