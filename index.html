<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クラス会出席確認</title>

<style>
body{
 font-family:sans-serif;
 background:#f4f6fa;
 max-width:900px;
 margin:auto;
 padding:20px;
}

h1{text-align:center;}

.row{
 display:flex;
 justify-content:space-between;
 background:white;
 margin:6px 0;
 padding:10px;
 border-radius:10px;
 box-shadow:0 2px 5px rgba(0,0,0,.08);
}

select{padding:5px;}

button{
 margin-top:10px;
 padding:8px 14px;
 border:none;
 border-radius:8px;
 background:black;
 color:white;
 cursor:pointer;
}

table{
 width:100%;
 margin-top:20px;
 border-collapse:collapse;
 background:white;
}

th,td{
 border:1px solid #ccc;
 padding:6px;
 text-align:center;
}

.ok{background:#c8f7c5;}
.morning{background:#bfe3ff;}
.afternoon{background:#fff4b3;}
.ng{background:#ffc7c7;}
</style>
</head>

<body>

<h1>クラス会 出席確認</h1>

名前：
<input id="name">

<button onclick="submitAnswer()">回答送信</button>
<button onclick="deleteAnswer()">削除</button>

<div id="dates"></div>

<h2>出席結果</h2>
<div id="result"></div>

<h3 id="best"></h3>

<script type="module" src="script.js"></script>
</body>
</html>
