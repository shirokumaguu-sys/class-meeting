<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クラス会出席確認</title>

<style>

body{
 font-family:sans-serif;
 background:#f5f5f5;
 text-align:center;
}

.card{
 background:white;
 max-width:1000px;
 margin:auto;
 padding:20px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,.1);
}

table{
 border-collapse:collapse;
 width:100%;
}

th,td{
 border:1px solid #ccc;
 padding:6px;
}

label{
 margin-right:10px;
 cursor:pointer;
}

.ok{background:#c8f7c5}
.morning{background:#c5dcff}
.afternoon{background:#fff1a8}
.ng{background:#ffc5c5}

button{
 background:black;
 color:white;
 border:none;
 padding:10px 20px;
 margin-top:15px;
 cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h1>クラス会 出席確認</h1>

名前：
<input id="name">

<table id="formTable"></table>

<button onclick="submitAnswer()">回答を送信</button>

<p id="message"></p>

</div>

<br>

<div class="card">

<h2>出席結果（リアルタイム）</h2>
<div id="result"></div>

<h3 id="best"></h3>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
